<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./style.css" rel="stylesheet"/>
    <title>Heure en temps réel</title>
</head>
<body>
    <div class="clock">
        <img src="./assets/crown_707163.png" alt="logo" id="logo"/>
        <div class="vertical">
            <span id="six">6</span>
            <span id="twelve">12</span>
        </div>
        <div class="horizontal">
            <span id="nine">9</span>
            <span id="three">3</span>    
        </div>
        <div class="center"></div>
        <div class="aiguilles">
            <div class="heure"></div>
            <div class="minute"></div>
            <div class="seconde"></div>
        </div>
    </div>
    <script src="./index.js"></script>
</body>
</html>
