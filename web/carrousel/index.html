<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="./style.css" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <title>Carrousel</title>
</head>
<body>
    <div class="slides">
        <div class="photos active">
            <img src="./assets/champi1.jpg" alt="morille"/>
        </div>
        <div class="photos">
            <img src="./assets/champi2.jpg" alt="amanite tue mouche"/>
        </div>
        <div class="photos">
            <img src="./assets/champi3.jpg" alt="champignon chapeau blanc"/>
        </div>
        <div class="photos">
            <img src="./assets/champi4.jpg" alt="champignons humides"/>
        </div>
        <div class="chevrons">
            <i class="fa-solid fa-chevron-left" id="prev"></i>
            <i class="fa-solid fa-chevron-right next" id="next"></i>
        </div>
    </div>
    <script src="./index.js"></script>
</body>
</html>
