<html lang="fr">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="/styles/styles.css" rel="stylesheet" />
        <link href="/styles/contact.css" rel="stylesheet"/>
        <link rel="icon" type="image/png" href="/assets/icon/favicon.png"/>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <title>Contact</title>
    </head>
    <body>
        <h1 style="text-align: center;">Contact</h1>
        <nav class="main">
            <ul>
                <li>
                    <a href="/">Accueil</a>
                </li>
                <li>
                    <a href="/pages/Nouveautes.html">Nouveautés</a>
                </li>
                <li>
                    <a href="/pages/Galerie_Photos.html">Galerie Photos</a>
                </li>
                <li>
                    <a href="/pages/La_Boutique.html">La Boutique</a>
                </li>
                <li>
                    <a href="">Contact</a>
                </li>
                <li>
                    <a href="/pages/connexion.html">Se connecter</a>
                </li>
            </ul>
        </nav>
        <form>
            <h2>Contactez-moi !</h2>
            <div class="corps-formulaire">
                <div class="gauche">
                    <div class="boite">
                        <label>Nom</label>
                        <input type="text" required>
                        <i class="fa-regular fa-user"></i>
                    </div>
                    <div class="boite">
                        <label>Prénom</label>
                        <input type="text" required>
                        <i class="fa-regular fa-user"></i>
                    </div>
                    <div class="boite">
                        <label>Adresse e-mail</label>
                        <input type="email" required>
                        <i class="fa-regular fa-envelope"></i>
                    </div>
                </div>
                <div class="droite">
                    <div class="boite">
                        <label>Message</label>
                        <textarea placeholder="Saisissez ici..." required></textarea>
                    </div>
                </div>
            </div>
            <div class="pied-formulaire" align="center">
                <button>Envoyer le message</button>
            </div>
        </form>
    </body>
</html>
